<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner Warehouse Pro + Flashlight</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg);
            color: white;
            margin: 0;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.2s ease;
        }

        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--glass-border);
        }

        #reader {
            width: 100%;
            min-height: 280px;
            border: none !important;
        }
        #reader video {
            width: 100% !important;
            object-fit: cover !important;
        }
        #reader__scan_region svg {
            fill: var(--accent-green) !important;
        }
        .scan-hint {
            text-align: center;
            font-size: 12px;
            color: #8e8e93;
            margin: -8px 0 8px;
            line-height: 1.35;
            padding: 0 8px;
        }
        .btn-photo {
            display: block;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 12px;
            cursor: pointer;
        }

        .torch-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .torch-btn.active {
            background: var(--accent-blue);
            border-color: transparent;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        body.flash-green { background-color: rgba(48, 209, 88, 0.5) !important; }
        body.flash-red { background-color: rgba(255, 69, 58, 0.5) !important; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }

        select {
            width: 100%; background: transparent; color: white;
            border: none; font-size: 18px; font-weight: 600; outline: none;
        }

        .btn-send {
            background: var(--accent-green);
            color: black; border: none; padding: 18px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            width: 100%; cursor: pointer; margin-top: 10px;
        }
        .btn-send:disabled { background: #3a3a3c; color: #8e8e93; }

        #status-display {
            text-align: center; font-size: 22px; font-weight: 700;
            margin: 15px 0; min-height: 30px; color: var(--accent-green);
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .credits {
            margin-top: auto; padding: 20px 0;
            text-align: center; font-size: 11px; color: #636366;
        }
    </style>
</head>
<body onclick="onBodyTap()">

    <div class="glass-panel">
        <select id="route-select" aria-label="Аллея или ворота"></select>
    </div>

    <div class="scanner-container">
        <div id="torch-toggle" class="torch-btn" onclick="toggleTorch()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 2H9a2 2 0 0 0-2 2v2h10V4a2 2 0 0 0-2-2z"/>
                <path d="M7 6h10v4a3 3 0 0 1-3 3H10a3 3 0 0 1-3-3V6z"/>
                <line x1="10" y1="17" x2="14" y2="17"/>
                <line x1="10" y1="21" x2="14" y2="21"/>
                <circle cx="12" cy="11" r="1"/>
            </svg>
        </div>
        <div id="reader"></div>
    </div>
    <p class="scan-hint" id="scan-hint">Держите код на расстоянии 15–25 см</p>
    <button type="button" class="btn-photo" id="photo-btn">Зафиксировать кадр</button>

    <div id="status-display">Готов к работе</div>

    <button class="btn-send" id="send-btn" onclick="sendData()">
        Отправить данные (0)
    </button>

    <div id="history-box" style="margin-top: 20px; flex-grow: 1;"></div>

    <div class="credits">
        © 2026 Идея D. Martinkevic, апгрейд 1093530<br>Для Софьино КБТ
    </div>

<script>
    // ——— Настройка: URL веб-приложения Google Apps Script ———
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxiWzAOa8g3dU_Dv0MacwgaqRltpTNM30-UDHnq_cQQelFoGrFb0eJII0jJ-St5luyR/exec';

    const routeSelect = document.getElementById('route-select');

    (function buildLocationSelect() {
        const alleyGroup = document.createElement('optgroup');
        alleyGroup.label = 'Аллея';
        for (let i = 0; i <= 10; i++) {
            const opt = document.createElement('option');
            opt.value = 'Аллея ' + i;
            opt.textContent = 'Аллея ' + i;
            alleyGroup.appendChild(opt);
        }
        routeSelect.appendChild(alleyGroup);

        const gateGroup = document.createElement('optgroup');
        gateGroup.label = 'Ворота';
        for (let i = 2; i <= 51; i++) {
            const opt = document.createElement('option');
            opt.value = 'Ворота ' + i;
            opt.textContent = 'Ворота ' + i;
            gateGroup.appendChild(opt);
        }
        routeSelect.appendChild(gateGroup);
    })();

    let routesStore = JSON.parse(localStorage.getItem('scanner_routes')) || {};

    Array.from(routeSelect.options).forEach(function (option) {
        if (!routesStore[option.value]) routesStore[option.value] = [];
    });
    
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    let lastScannedCode = null;
    let audioContext = null;
    let isSending = false;
    let isTorchOn = false;
    let scannerInstance = null;
    let videoTrack = null;
    let cameraStarted = false;
    let scanEngine = null;
    let nativeDetector = null;
    let nativeLoopActive = false;

    if (isIOS) {
        document.getElementById('scan-hint').textContent =
            'iPhone: нажмите экран, если камера чёрная. 20–30 см. Не читает — «Зафиксировать кадр».';
    }

    async function captureFrameAndScan() {
        if (!cameraStarted) {
            alert('Сначала дождитесь запуска камеры.');
            return;
        }

        const video = document.querySelector('#reader video');
        if (!video || video.readyState < 2) {
            alert('Камера ещё не готова. Подождите секунду.');
            return;
        }

        initAudio();
        screenFlash('green');

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        try {
            if (nativeDetector) {
                const codes = await nativeDetector.detect(canvas);
                if (!codes.length) throw new Error('no code');
                onScanSuccess(codes[0].rawValue);
                return;
            }
            if (scannerInstance) {
                const blob = await new Promise(function (resolve) {
                    canvas.toBlob(resolve, 'image/jpeg', 0.92);
                });
                const file = new File([blob], 'frame.jpg', { type: 'image/jpeg' });
                const text = await scannerInstance.scanFile(file, false);
                onScanSuccess(text);
                return;
            }
            throw new Error('no engine');
        } catch (err) {
            screenFlash('red');
            alert('QR на кадре не найден. Подстройте расстояние, свет и нажмите снова.');
        }
    }

    document.getElementById('photo-btn').addEventListener('click', captureFrameAndScan);

    function onBodyTap() {
        initAudio();
        startCamera();
    }

    function saveToLocal() {
        localStorage.setItem('scanner_routes', JSON.stringify(routesStore));
    }

    function initAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') audioContext.resume();
    }

    document.getElementById('route-select').addEventListener('change', () => {
        initAudio();
        lastScannedCode = null;
        updateInterface();
    });

    function playBeep() {
        if (!audioContext) return;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.frequency.setValueAtTime(1000, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.start(); osc.stop(audioContext.currentTime + 0.1);
    }

    function screenFlash(type) {
        document.body.classList.add('flash-' + type);
        setTimeout(() => document.body.classList.remove('flash-' + type), 250);
    }

    async function toggleTorch() {
        if (!videoTrack) return;
        try {
            const state = !isTorchOn;
            await videoTrack.applyConstraints({ advanced: [{ torch: state }] });
            isTorchOn = state;
            document.getElementById('torch-toggle').classList.toggle('active', isTorchOn);
        } catch (err) {
            console.error('Фонарик не поддерживается', err);
        }
    }

    function onScanSuccess(decodedText) {
        if (isSending) return;

        let cleanId = decodedText.trim();
        if (cleanId.includes(':')) {
            const parts = cleanId.split(':');
            cleanId = parts.length > 2 ? parts[2] : cleanId;
        }

        const currentRoute = document.getElementById('route-select').value;
        const status = document.getElementById('status-display');

        if (!routesStore[currentRoute]) routesStore[currentRoute] = [];

        if (routesStore[currentRoute].some(item => item.id === cleanId)) {
            if (lastScannedCode !== cleanId) {
                screenFlash('red');
                status.textContent = 'ДУБЛИКАТ';
                status.style.color = 'var(--accent-red)';
                lastScannedCode = cleanId;
            }
            return;
        }

        lastScannedCode = cleanId;
        playBeep();
        screenFlash('green');
        status.textContent = cleanId;
        status.style.color = 'var(--accent-green)';
        if (navigator.vibrate) navigator.vibrate(50);

        // ПРАВКА: Теперь время сохраняется с секундами
        const now = new Date();
        const timeWithSeconds = now.toLocaleTimeString('ru-RU');

        routesStore[currentRoute].unshift({ 
            id: cleanId, 
            time: timeWithSeconds 
        });
        
        saveToLocal();
        updateInterface();
    }

    function updateInterface() {
        const route = document.getElementById('route-select').value;
        const container = document.getElementById('history-box');
        const list = routesStore[route] || [];
        
        let htmlString = list.length > 0 ? '<h4 style="color:#8e8e93; margin:0 0 10px 5px">ИСТОРИЯ</h4>' : '';
        htmlString += list.map(item => 
            `<div class="history-item"><b>${item.id}</b><span style="color:#8e8e93; font-variant-numeric: tabular-nums;">${item.time}</span></div>`
        ).join('');
        container.innerHTML = htmlString;

        const btn = document.getElementById('send-btn');
        btn.textContent = `Отправить · ${route} (${list.length})`;
        btn.disabled = list.length === 0 || isSending;
    }

    async function sendData() {
        const route = document.getElementById('route-select').value;
        const status = document.getElementById('status-display');
        const list = routesStore[route] || [];
        if (!list.length) return;

        const payload = JSON.stringify({ route: route, data: list });

        isSending = true;
        updateInterface();
        status.textContent = 'Отправка...';

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: payload,
                redirect: 'follow'
            });

            const text = await response.text();
            let result = {};
            try {
                result = JSON.parse(text);
            } catch (e) {
                result = {};
            }

            if (!response.ok || result.ok === false) {
                throw new Error(result.error || 'Сервер: ' + response.status);
            }

            routesStore[route] = [];
            saveToLocal();
            lastScannedCode = null;
            const n = result.written != null ? result.written : list.length;
            status.textContent = 'Записано в таблицу: ' + n;
            status.style.color = 'var(--accent-green)';
        } catch (err) {
            console.error(err);
            alert(
                'Данные НЕ записаны в таблицу.\n' +
                (err.message || err) +
                '\n\nПроверьте вкладку «Сканирования» в той же таблице, где Apps Script.\n' +
                'На GitHub залейте свежий index.html.\n' +
                'Список на телефоне сохранён — отправьте снова.'
            );
            status.textContent = 'Ошибка!';
            status.style.color = 'var(--accent-red)';
        } finally {
            isSending = false;
            updateInterface();
        }
    }

    async function canUseNativeScanner() {
        if (!('BarcodeDetector' in window)) return false;
        try {
            const formats = await BarcodeDetector.getSupportedFormats();
            return formats.indexOf('qr_code') !== -1;
        } catch (e) {
            return false;
        }
    }

    function setupTorchFromTrack() {
        if (videoTrack && videoTrack.getCapabilities && videoTrack.getCapabilities().torch) {
            document.getElementById('torch-toggle').style.display = 'flex';
        }
    }

    async function startNativeCamera(status) {
        const reader = document.getElementById('reader');
        reader.innerHTML = '';

        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('webkit-playsinline', 'true');
        video.muted = true;
        reader.appendChild(video);

        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        });

        video.srcObject = stream;
        await video.play();

        videoTrack = stream.getVideoTracks()[0];
        setupTorchFromTrack();

        nativeDetector = new BarcodeDetector({ formats: ['qr_code'] });
        scanEngine = 'native';
        nativeLoopActive = true;

        status.textContent = 'Быстрый режим · готов';
        status.style.color = 'var(--accent-green)';

        (async function nativeScanLoop() {
            while (nativeLoopActive) {
                try {
                    const codes = await nativeDetector.detect(video);
                    if (codes.length > 0) {
                        onScanSuccess(codes[0].rawValue);
                    }
                } catch (e) { /* кадр без кода */ }
                await new Promise(function (r) { setTimeout(r, 40); });
            }
        })();
    }

    async function startHtml5Camera(status) {
        scannerInstance = new Html5Qrcode('reader', {
            formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
            verbose: false
        });

        await scannerInstance.start(
            { facingMode: 'environment' },
            {
                fps: isIOS ? 12 : 18,
                disableFlip: true,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true },
                qrbox: function (w, h) {
                    const edge = Math.min(w, h);
                    const size = Math.floor(edge * 0.9);
                    return { width: size, height: size };
                }
            },
            onScanSuccess
        );

        scanEngine = 'html5';
        status.textContent = 'Готов к работе';
        status.style.color = 'var(--accent-green)';

        const video = document.querySelector('#reader video');
        if (video && video.srcObject) {
            videoTrack = video.srcObject.getVideoTracks()[0];
            setupTorchFromTrack();
        }
    }

    async function startCamera() {
        if (cameraStarted) return;
        const status = document.getElementById('status-display');

        try {
            if (await canUseNativeScanner()) {
                await startNativeCamera(status);
            } else {
                await startHtml5Camera(status);
            }
            cameraStarted = true;
        } catch (err) {
            console.error(err);
            if (scanEngine === 'native') {
                nativeLoopActive = false;
                scanEngine = null;
                nativeDetector = null;
                document.getElementById('reader').innerHTML = '';
                try {
                    await startHtml5Camera(status);
                    cameraStarted = true;
                    return;
                } catch (err2) {
                    console.error(err2);
                }
            }
            status.textContent = 'Нажмите экран — разрешить камеру';
            status.style.color = '#ff9f0a';
        }
    }

    startCamera();

    updateInterface();
</script>
</body>
</html>
