<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner Warehouse Pro + Flashlight</title>
    <script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--ios-bg);
            color: white;
            margin: 0;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.2s ease;
        }

        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--glass-border);
        }

        #reader {
            width: 100%;
            min-height: 260px;
            background: #000;
        }
        #reader video {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        .scan-hint {
            text-align: center;
            font-size: 12px;
            color: #8e8e93;
            margin: -8px 0 8px;
            line-height: 1.35;
            padding: 0 8px;
        }
        .btn-photo {
            display: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 12px;
            cursor: pointer;
        }

        .torch-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .torch-btn.active {
            background: var(--accent-blue);
            border-color: transparent;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        body.flash-green { background-color: rgba(48, 209, 88, 0.5) !important; }
        body.flash-red { background-color: rgba(255, 69, 58, 0.5) !important; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }

        select {
            width: 100%; background: transparent; color: white;
            border: none; font-size: 18px; font-weight: 600; outline: none;
        }

        .btn-send {
            background: var(--accent-green);
            color: black; border: none; padding: 18px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            width: 100%; cursor: pointer; margin-top: 10px;
        }
        .btn-send:disabled { background: #3a3a3c; color: #8e8e93; }

        #status-display {
            text-align: center; font-size: 22px; font-weight: 700;
            margin: 15px 0; min-height: 30px; color: var(--accent-green);
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .credits {
            margin-top: auto; padding: 20px 0;
            text-align: center; font-size: 11px; color: #636366;
        }
    </style>
</head>
<body onclick="initAudio()">

    <div class="glass-panel">
        <select id="route-select" aria-label="Аллея или ворота"></select>
    </div>

    <div class="scanner-container">
        <div id="torch-toggle" class="torch-btn" onclick="toggleTorch()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 2H9a2 2 0 0 0-2 2v2h10V4a2 2 0 0 0-2-2z"/>
                <path d="M7 6h10v4a3 3 0 0 1-3 3H10a3 3 0 0 1-3-3V6z"/>
                <line x1="10" y1="17" x2="14" y2="17"/>
                <line x1="10" y1="21" x2="14" y2="21"/>
                <circle cx="12" cy="11" r="1"/>
            </svg>
        </div>
        <div id="reader"></div>
    </div>
    <p class="scan-hint" id="scan-hint">Держите код на расстоянии 15–25 см</p>
    <input type="file" id="photo-input" accept="image/*" capture="environment" hidden>
    <button type="button" class="btn-photo" id="photo-btn">Сфотографировать QR</button>

    <div id="status-display">Готов к работе</div>

    <button class="btn-send" id="send-btn" onclick="sendData()">
        Отправить данные (0)
    </button>

    <div id="history-box" style="margin-top: 20px; flex-grow: 1;"></div>

    <div class="credits">
        © 2026 Идея D. Martinkevic, апгрейд 1093530<br>Для Софьино КБТ
    </div>

<script>
    // ——— Настройка: URL веб-приложения Google Apps Script ———
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxiWzAOa8g3dU_Dv0MacwgaqRltpTNM30-UDHnq_cQQelFoGrFb0eJII0jJ-St5luyR/exec';

    const routeSelect = document.getElementById('route-select');

    (function buildLocationSelect() {
        const alleyGroup = document.createElement('optgroup');
        alleyGroup.label = 'Аллея';
        for (let i = 0; i <= 10; i++) {
            const opt = document.createElement('option');
            opt.value = 'Аллея ' + i;
            opt.textContent = 'Аллея ' + i;
            alleyGroup.appendChild(opt);
        }
        routeSelect.appendChild(alleyGroup);

        const gateGroup = document.createElement('optgroup');
        gateGroup.label = 'Ворота';
        for (let i = 2; i <= 51; i++) {
            const opt = document.createElement('option');
            opt.value = 'Ворота ' + i;
            opt.textContent = 'Ворота ' + i;
            gateGroup.appendChild(opt);
        }
        routeSelect.appendChild(gateGroup);
    })();

    let routesStore = JSON.parse(localStorage.getItem('scanner_routes')) || {};

    Array.from(routeSelect.options).forEach(function (option) {
        if (!routesStore[option.value]) routesStore[option.value] = [];
    });
    
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    let lastScannedCode = null;
    let audioContext = null;
    let isSending = false;
    let isTorchOn = false;
    let scannerInstance = null;

    if (isIOS) {
        document.getElementById('scan-hint').textContent =
            'iPhone: 20–30 см, хороший свет. Вплотную не фокусируется. Не читает — кнопка «Сфотографировать QR».';
        document.getElementById('photo-btn').style.display = 'block';
    } else {
        document.getElementById('scan-hint').textContent =
            'Держите код на расстоянии 15–25 см (вплотную камера часто не фокусируется)';
    }

    document.getElementById('photo-btn').addEventListener('click', function () {
        document.getElementById('photo-input').click();
    });

    document.getElementById('photo-input').addEventListener('change', async function (e) {
        const file = e.target.files && e.target.files[0];
        e.target.value = '';
        if (!file) return;
        try {
            const result = await QrScanner.scanImage(file, { returnDetailedScanResult: true });
            onScanSuccess(result.data);
        } catch (err) {
            alert('QR на снимке не найден. Подойдите ближе, включите свет, снимите ровно.');
        }
    });

    function saveToLocal() {
        localStorage.setItem('scanner_routes', JSON.stringify(routesStore));
    }

    function initAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') audioContext.resume();
    }

    document.getElementById('route-select').addEventListener('change', () => {
        initAudio();
        lastScannedCode = null;
        updateInterface();
    });

    function playBeep() {
        if (!audioContext) return;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.frequency.setValueAtTime(1000, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.start(); osc.stop(audioContext.currentTime + 0.1);
    }

    function screenFlash(type) {
        document.body.classList.add('flash-' + type);
        setTimeout(() => document.body.classList.remove('flash-' + type), 250);
    }

    async function toggleTorch() {
        if (!scannerInstance) return;
        try {
            if (isTorchOn) {
                await scannerInstance.turnFlashOff();
            } else {
                await scannerInstance.turnFlashOn();
            }
            isTorchOn = !isTorchOn;
            document.getElementById('torch-toggle').classList.toggle('active', isTorchOn);
        } catch (err) {
            console.error('Фонарик не поддерживается', err);
        }
    }

    function onScanSuccess(decodedText) {
        if (isSending) return;

        let cleanId = decodedText.trim();
        if (cleanId.includes(':')) {
            const parts = cleanId.split(':');
            cleanId = parts.length > 2 ? parts[2] : cleanId;
        }

        const currentRoute = document.getElementById('route-select').value;
        const status = document.getElementById('status-display');

        if (!routesStore[currentRoute]) routesStore[currentRoute] = [];

        if (routesStore[currentRoute].some(item => item.id === cleanId)) {
            if (lastScannedCode !== cleanId) {
                screenFlash('red');
                status.textContent = 'ДУБЛИКАТ';
                status.style.color = 'var(--accent-red)';
                lastScannedCode = cleanId;
            }
            return;
        }

        lastScannedCode = cleanId;
        playBeep();
        screenFlash('green');
        status.textContent = cleanId;
        status.style.color = 'var(--accent-green)';
        if (navigator.vibrate) navigator.vibrate(50);

        // ПРАВКА: Теперь время сохраняется с секундами
        const now = new Date();
        const timeWithSeconds = now.toLocaleTimeString('ru-RU');

        routesStore[currentRoute].unshift({ 
            id: cleanId, 
            time: timeWithSeconds 
        });
        
        saveToLocal();
        updateInterface();
    }

    function updateInterface() {
        const route = document.getElementById('route-select').value;
        const container = document.getElementById('history-box');
        const list = routesStore[route] || [];
        
        let htmlString = list.length > 0 ? '<h4 style="color:#8e8e93; margin:0 0 10px 5px">ИСТОРИЯ</h4>' : '';
        htmlString += list.map(item => 
            `<div class="history-item"><b>${item.id}</b><span style="color:#8e8e93; font-variant-numeric: tabular-nums;">${item.time}</span></div>`
        ).join('');
        container.innerHTML = htmlString;

        const btn = document.getElementById('send-btn');
        btn.textContent = `Отправить · ${route} (${list.length})`;
        btn.disabled = list.length === 0 || isSending;
    }

    async function sendData() {
        const route = document.getElementById('route-select').value;
        const status = document.getElementById('status-display');
        const list = routesStore[route] || [];
        if (!list.length) return;

        const payload = JSON.stringify({ route: route, data: list });

        isSending = true;
        updateInterface();
        status.textContent = 'Отправка...';

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: payload,
                redirect: 'follow'
            });

            const text = await response.text();
            let result = {};
            try {
                result = JSON.parse(text);
            } catch (e) {
                result = {};
            }

            if (!response.ok || result.ok === false) {
                throw new Error(result.error || 'Сервер: ' + response.status);
            }

            routesStore[route] = [];
            saveToLocal();
            lastScannedCode = null;
            const n = result.written != null ? result.written : list.length;
            status.textContent = 'Записано в таблицу: ' + n;
            status.style.color = 'var(--accent-green)';
        } catch (err) {
            console.error(err);
            alert(
                'Данные НЕ записаны в таблицу.\n' +
                (err.message || err) +
                '\n\nПроверьте вкладку «Сканирования» в той же таблице, где Apps Script.\n' +
                'На GitHub залейте свежий index.html.\n' +
                'Список на телефоне сохранён — отправьте снова.'
            );
            status.textContent = 'Ошибка!';
            status.style.color = 'var(--accent-red)';
        } finally {
            isSending = false;
            updateInterface();
        }
    }

    (async function initScanner() {
        QrScanner.WORKER_PATH = 'https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner-worker.min.js';

        const reader = document.getElementById('reader');
        const video = document.createElement('video');
        video.setAttribute('playsinline', 'true');
        video.setAttribute('webkit-playsinline', 'true');
        video.setAttribute('muted', 'true');
        video.muted = true;
        reader.appendChild(video);

        scannerInstance = new QrScanner(
            video,
            function (decodedText) { onScanSuccess(decodedText); },
            {
                preferredCamera: 'environment',
                maxScansPerSecond: isIOS ? 12 : 20,
                highlightScanRegion: true,
                highlightCodeOutline: true
            }
        );

        try {
            await scannerInstance.start();
            if (await scannerInstance.hasFlash()) {
                document.getElementById('torch-toggle').style.display = 'flex';
            }
        } catch (err) {
            console.error(err);
            alert('Камера недоступна. Проверьте разрешения.');
        }
    })();

    updateInterface();
</script>
</body>
</html>
